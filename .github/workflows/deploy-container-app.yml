name: Deploy App to Azure Container Apps

on:
  push:
    branches:
      - master
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'infra/**'
      - '.github/workflows/deploy-infra.yml'
      - '.github/workflows/squad-*.yml'
      - '.github/workflows/sync-squad-labels.yml'
  workflow_dispatch:

# OIDC federated login to Azure
permissions:
  id-token: write
  contents: read

env:
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP || 'rg-pizza-app-demo' }}
  CONTAINER_APP_NAME: ${{ vars.CONTAINER_APP_NAME || 'pizzaapp' }}
  IMAGE_NAME: pizza-app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npx jest --ci

      - name: Read VERSION
        id: version
        run: echo "value=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Discover ACR from Container App
        id: acr
        run: |
          ACR_SERVER=$(az containerapp show \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --query "properties.configuration.registries[0].server" \
            -o tsv 2>/dev/null || true)
          if [ -z "$ACR_SERVER" ] || [ "$ACR_SERVER" = "null" ]; then
            # Fallback: pick the only ACR in the resource group
            ACR_SERVER=$(az acr list \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --query "[0].loginServer" -o tsv)
          fi
          if [ -z "$ACR_SERVER" ] || [ "$ACR_SERVER" = "null" ]; then
            echo "::error::Could not determine ACR. Run the deploy-infra workflow first."
            exit 1
          fi
          ACR_NAME="${ACR_SERVER%%.*}"
          echo "server=$ACR_SERVER" >> "$GITHUB_OUTPUT"
          echo "name=$ACR_NAME" >> "$GITHUB_OUTPUT"

      - name: ACR login
        run: az acr login --name "${{ steps.acr.outputs.name }}"

      - name: Build and push image
        id: image
        run: |
          IMAGE_TAG="${{ steps.version.outputs.value }}-${GITHUB_SHA::7}"
          FULL_IMAGE="${{ steps.acr.outputs.server }}/$IMAGE_NAME:$IMAGE_TAG"
          docker build \
            -t "$FULL_IMAGE" \
            -t "${{ steps.acr.outputs.server }}/$IMAGE_NAME:latest" \
            .
          docker push "$FULL_IMAGE"
          docker push "${{ steps.acr.outputs.server }}/$IMAGE_NAME:latest"
          echo "ref=$FULL_IMAGE" >> "$GITHUB_OUTPUT"

      - name: Ensure Container App can pull from ACR
        run: |
          PRINCIPAL_ID=$(az containerapp show \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --query identity.principalId -o tsv)

          if [ -z "$PRINCIPAL_ID" ] || [ "$PRINCIPAL_ID" = "null" ]; then
            echo "::error::Container App system-assigned identity is missing."
            exit 1
          fi

          ACR_ID=$(az acr show \
            --name "${{ steps.acr.outputs.name }}" \
            --query id -o tsv)

          ACR_PULL_ROLE_ID=$(az role definition list \
            --name AcrPull \
            --query "[0].id" -o tsv)

          EXISTING_ASSIGNMENT=$(az role assignment list \
            --assignee-object-id "$PRINCIPAL_ID" \
            --scope "$ACR_ID" \
            --role "$ACR_PULL_ROLE_ID" \
            --query "[0].id" -o tsv)

          if [ -z "$EXISTING_ASSIGNMENT" ]; then
            az role assignment create \
              --assignee-object-id "$PRINCIPAL_ID" \
              --assignee-principal-type ServicePrincipal \
              --role "$ACR_PULL_ROLE_ID" \
              --scope "$ACR_ID" \
              --output none
          fi

          az containerapp registry set \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --server "${{ steps.acr.outputs.server }}" \
            --identity system \
            --output none

      - name: Update Container App image
        run: |
          az containerapp update \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --image "${{ steps.image.outputs.ref }}" \
            --set-env-vars APP_VERSION=${{ steps.version.outputs.value }} \
            --output none

      - name: Show app URL
        run: |
          FQDN=$(az containerapp show \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "### App deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: \`${{ steps.image.outputs.ref }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: https://$FQDN" >> "$GITHUB_STEP_SUMMARY"
